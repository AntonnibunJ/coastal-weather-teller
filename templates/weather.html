<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ weather.location }} Weather Report</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Trebuchet MS', sans-serif;
        }

        body {
            background: linear-gradient(rgba(0,30,60,0.65), rgba(0,80,120,0.75)),
                        url("{{ url_for('static', filename='background.jpg') }}") no-repeat center center fixed;
            background-size: cover;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .weather-card {
            background: rgba(0, 0, 0, 0.45);
            padding: 40px;
            border-radius: 30px;
            width: 95%;
            max-width: 700px;
            text-align: center;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 35px rgba(0,255,255,0.35);
            animation: floatCard 4s ease-in-out infinite;
        }

        @keyframes floatCard {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 3rem;
            color: #7df9ff;
            margin-bottom: 25px;
            text-shadow: 2px 2px 10px #000;
        }

        .weather-info p {
            font-size: 1.4rem;
            margin: 15px 0;
            color: #ffffff;
        }

        strong {
            color: #ffd700;
        }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 25px;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: linear-gradient(45deg, #ffd700, #ff8c00);
            transform: scale(1.05);
        }

        .emoji {
            font-size: 2rem;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>

<div class="weather-card">
    <div class="emoji">🌊🐚☀️</div>

    <h1>{{ weather.location }} Weather Report</h1>

    <div class="weather-info">
        <p><strong>Temperature:</strong> {{ weather.temperature }} °C</p>
        <p><strong>Humidity:</strong> {{ weather.humidity }}%</p>
        <p><strong>Wind Speed:</strong> {{ weather.wind_speed }} m/s</p>
        <p><strong>Condition:</strong> {{ weather.condition }}</p>
    </div>

    <a href="/" class="back-btn">Back to Home</a>
</div>

</body>
</html>
